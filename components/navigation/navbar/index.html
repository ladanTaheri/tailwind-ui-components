<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>navbar | tailwind ui components</title>
    <link rel="stylesheet" href="../../../styles/output.css" />
    <script src="js/main.js" defer></script>
  </head>
  <body class="bg-gray-100">
    <header>
      <nav
        class="flex justify-between h-16 items-center font-sans shadow-xl/20 shadow-indigo-300 px-6 py-10 bg-white"
      >
        <a href="#"><img src="images/logo.png" alt="" class="h-14 w-auto" /></a>
        <button
          type="button"
          aria-label="Toggle navigation"
          class="navbar-toggler h-10 w-auto cursor-pointer md:hidden"
        >
          <img
            src="images/burger.svg"
            alt=""
            class="w-full h-full object-contain"
          />
        </button>
        <ul
          class="navbar-menu capitalize text-zinc-900 gap-8 font-semibold bg-white px-2.5 py-5 hidden flex-col absolute top-20 left-0 w-full md:flex md:flex-row md:static md:w-auto"
        >
          <li>
            <a
              href="#"
              class="transition-colors duration-300 text-indigo-600 border-b-2 border-indigo-400 py-4 focus:outline focus:ring-2 focus:ring-indigo-300"
              >home</a
            >
          </li>
          <li>
            <a
              href="#"
              class="transition-colors duration-300 hover:text-indigo-600  py-4  focus:outline focus:ring-2 focus:ring-indigo-300""
              >about</a
            >
          </li>
          <li>
            <a
              href="#"
              class="transition-colors duration-300 hover:text-indigo-600  py-4  focus:outline focus:ring-2 focus:ring-indigo-300""
              >blog</a
            >
          </li>
          <li>
            <a
              href="#"
              class="transition-colors duration-300 hover:text-indigo-600  py-4  focus:outline focus:ring-2 focus:ring-indigo-300""
              >contact</a
            >
          </li>
        </ul>
        <div class="capitalize text-zinc-900 gap-4 font-medium hidden md:flex">
          <a
            href="#"
            class="bg-indigo-600 border border-indigo-600 text-white px-4 py-1.5 text-sm rounded-lg transition-colors duration-300 hover:bg-white hover:text-indigo-600"
            >login</a
          >
          <a
            href="#"
            class="bg-zinc-900 border border-zinc-900 text-white px-4 py-1.5 text-sm rounded-lg transition-colors duration-300 hover:bg-white hover:text-zinc-900"
            >register</a
          >
        </div>
      </nav>
    </header>
  </body>
</html>
