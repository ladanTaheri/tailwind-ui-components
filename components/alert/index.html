<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>info alert</title>
    <link rel="stylesheet" href="../../styles/output.css" />
    <link
      rel="stylesheet"
      href="../../assets/font-awesome/css/font-awesome.min.css"
    />
  </head>
  <body class="bg-gray-100 p-10">
    <main>
      <section
        class="bg-blue-50 border border-blue-300 text-blue-900 p-4 rounded-lg"
      >
        <h2 class="text-lg font-medium mb-2 flex gap-2 items-baseline">
          <i
            class="fa fa-info-circle text-black text-xl"
            aria-hidden="true"
          ></i>
          <span>This is an info alert</span>
        </h2>
        <p class="text-sm mb-4">
          More info about this info alert goes here. This example text is going
          to run a bit longer so that you can see how spacing within an alert
          works with this kind of content.
        </p>
        <div class="flex gap-2">
          <a
            href="#"
            class="text-xs border border-blue-800 text-white bg-blue-800 px-3 py-1.5 rounded-lg hover:bg-blue-900 hover:border-blue-900 inline-flex gap-1 items-baseline focus:outline-none focus:ring-2 focus:ring-blue-200 transition-colors duration-200"
          >
            <i class="fa fa-eye" aria-hidden="true"></i> View more</a
          >
          <button
            href="#"
            class="text-xs border border-blue-800 px-3 py-1.5 rounded-lg hover:bg-blue-900 hover:border-blue-900 hover:text-white focus:outline-none focus:ring-2 focus:ring-blue-200 transition-colors duration-200"
          >
            Dismiss
          </button>
        </div>
      </section>
    </main>
  </body>
</html>
