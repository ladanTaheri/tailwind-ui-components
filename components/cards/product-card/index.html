<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>product card | tailwind-ui-components</title>
    <link rel="stylesheet" href="../../../styles/output.css" />
    <link
      rel="stylesheet"
      href="../../../assets/font-awesome/css/font-awesome.min.css"
    />
  </head>
  <body class="bg-gray-100 p-2 sm:p-10">
    <main class="flex justify-center items-center min-h-screen">
      <article
        class="max-w-sm w-full border border-gray-200 rounded-lg bg-white shadow-md flex flex-col"
      >
        <figure
          class="h-56 rounded-t-lg bg-gray-50 flex items-center justify-center"
        >
          <img
            class="max-w-full max-h-full object-contain"
            src="images/watch.png"
            alt="Galaxy Watch7"
          />
        </figure>
        <div class="p-5">
          <h2 class="text-2xl font-bold text-gray-900 mb-2 tracking-tight">
            Galaxy Watch7
          </h2>
          <p class="text-gray-700 mb-4">
            Power through your day with advanced fitness tracking, heart rate
            monitoring, and a vibrant AMOLED display.
          </p>
          <div class="flex justify-between items-center">
            <p class="text-xl font-semibold">$299</p>
            <button
              class="inline-flex gap-2 items-center bg-blue-700 text-white px-3 py-2 rounded-lg hover:bg-blue-800 focus:outline-none focus:ring-2 focus:ring-blue-300 transition-colors duration-200"
              type="button"
            >
              <i class="fa fa-cart-plus" aria-hidden="true"></i
              ><span>Add to Cart</span>
            </button>
          </div>
        </div>
      </article>
    </main>
  </body>
</html>
